  - listitem: /CMP8001 — Software Development \(\d+ cr\)/
  - listitem: /CMP8002 — Object Oriented Software Engineering \(\d+ cr\)/
  - listitem: CMP8003 — Introduction to Databases (5 cr)
  - listitem: CMP8004 — Web Design and Client-Side Scripting (5 cr)
  - listitem: CMP8005 — Computer Architecture, Operating Systems and Networks (5 cr)
  - listitem: /CMP8006 — Agile Software Development \(\d+ cr\)/
  - listitem: /CMP8007 — Capstone Project \(\d+ cr\)/
- text: Programme Learning Outcomes (PLOs)
- list:
  - listitem: Design, develop and test software applications using object-oriented programming principles and industry-standard development practices
  - listitem: Apply software engineering methodologies to plan, manage and deliver software projects within professional contexts
  - listitem: Design and implement database solutions using relational database management systems and SQL
  - listitem: Create responsive and accessible web applications using modern web technologies and frameworks
  - listitem: Demonstrate understanding of computer architecture, operating systems and network fundamentals
  - listitem: Work effectively in agile software development teams, applying iterative development practices
  - listitem: Research, design and implement a substantial software project demonstrating integration of learned skills
  - listitem: Communicate technical concepts effectively through documentation and presentations
